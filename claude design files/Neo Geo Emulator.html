// ─── SYSTEM LOGO component ─────────────────────────────────────────────────
function SystemLogo({ systemId, height = 22, style = {} }) {
  const sys = SYSTEMS[systemId];
  if (!sys) return null;
  if (sys.logoType === "png") {
    return <img src={sys.logo} alt={sys.name}
      style={{ height, width: height, objectFit:"cover", borderRadius:"50%", display:"block", ...style }}/>;
  }
  // SVG logos — wider aspect
  return <img src={sys.logo} alt={sys.name}
    style={{ height: height * 0.72, width: height * 1.9, objectFit:"contain", display:"block", ...style }}/>;
}

// ─── BOX ART ───────────────────────────────────────────────────────────────
function BoxArt({ game, size = 160 }) {
  const w = size, h = Math.round(size * 1.38);
  const Shapes = {
    tank: <g opacity="0.26" stroke={game.c2} strokeWidth="1.8" fill="none">
      <rect x={w*.08} y={h*.32} width={w*.84} height={h*.12} rx="3" fill={game.c2} opacity="0.14" stroke={game.c2}/>
      <rect x={w*.18} y={h*.19} width={w*.64} height={h*.14} rx="3" fill={game.c2} opacity="0.09" stroke={game.c2}/>
      <circle cx={w*.25} cy={h*.46} r={w*.085}/><circle cx={w*.75} cy={h*.46} r={w*.085}/>
      <rect x={w*.42} y={h*.08} width={w*.07} height={h*.13} rx="2"/>
      <line x1={w*.35} y1={h*.25} x2={w*.65} y2={h*.25}/>
    </g>,
    fighters: <g opacity="0.26" stroke={game.c2} strokeWidth="1.6" fill="none">
      <circle cx={w*.34} cy={h*.3} r={w*.12}/><circle cx={w*.66} cy={h*.3} r={w*.12}/>
      <path d={`M${w*.22} ${h*.5} C${w*.25} ${h*.25} ${w*.75} ${h*.25} ${w*.78} ${h*.5}`}/>
      <line x1={w*.28} y1={h*.42} x2={w*.38} y2={h*.62} strokeLinecap="round"/>
      <line x1={w*.72} y1={h*.42} x2={w*.62} y2={h*.62} strokeLinecap="round"/>
      <line x1={w*.38} y1={h*.62} x2={w*.62} y2={h*.62}/>
    </g>,
    sword: <g opacity="0.3" stroke={game.c2} strokeWidth="1.8" fill="none">
      <line x1={w*.5} y1={h*.05} x2={w*.5} y2={h*.7} strokeLinecap="round"/>
      <polygon points={`${w*.5},${h*.05} ${w*.44},${h*.2} ${w*.56},${h*.2}`} fill={game.c2} opacity="0.25" stroke="none"/>
      <line x1={w*.18} y1={h*.38} x2={w*.82} y2={h*.38}/>
      <circle cx={w*.5} cy={h*.38} r={w*.04} fill={game.c2} opacity="0.5" stroke="none"/>
    </g>,
    wolf: <g opacity="0.26" stroke={game.c2} strokeWidth="1.6" fill="none">
      <path d={`M${w*.22} ${h*.6} C${w*.18} ${h*.28} ${w*.5} ${h*.08} ${w*.5} ${h*.08} C${w*.5} ${h*.08} ${w*.82} ${h*.28} ${w*.78} ${h*.6}`}/>
      <circle cx={w*.5} cy={h*.36} r={w*.15}/>
      <path d={`M${w*.37} ${h*.14} L${w*.3} ${h*.04} M${w*.63} ${h*.14} L${w*.7} ${h*.04}`} strokeLinecap="round"/>
      <path d={`M${w*.4} ${h*.42} Q${w*.5} ${h*.5} ${w*.6} ${h*.42}`}/>
    </g>,
    blade: <g opacity="0.28" stroke={game.c2} strokeWidth="1.7" fill="none">
      <line x1={w*.28} y1={h*.08} x2={w*.72} y2={h*.72} strokeLinecap="round"/>
      <line x1={w*.72} y1={h*.08} x2={w*.28} y2={h*.72} strokeDasharray="5 3" opacity="0.5"/>
      <circle cx={w*.5} cy={h*.4} r={w*.1}/><circle cx={w*.5} cy={h*.4} r={w*.05} fill={game.c2} opacity="0.4" stroke="none"/>
      <line x1={w*.15} y1={h*.4} x2={w*.38} y2={h*.4} strokeLinecap="round"/>
      <line x1={w*.85} y1={h*.4} x2={w*.62} y2={h*.4} strokeLinecap="round"/>
    </g>,
    bubble: <g opacity="0.26" stroke={game.c2} strokeWidth="1.6" fill="none">
      <circle cx={w*.3} cy={h*.28} r={w*.12}/><circle cx={w*.63} cy={h*.2} r={w*.09}/>
      <circle cx={w*.56} cy={h*.46} r={w*.14}/><circle cx={w*.28} cy={h*.52} r={w*.07}/>
      <circle cx={w*.72} cy={h*.43} r={w*.08}/>
    </g>,
    ball: <g opacity="0.26" stroke={game.c2} strokeWidth="1.6" fill="none">
      <circle cx={w*.5} cy={h*.36} r={w*.22}/>
      <path d={`M${w*.28} ${h*.18} Q${w*.5} ${h*.36} ${w*.72} ${h*.18}`}/>
      <path d={`M${w*.19} ${h*.4} Q${w*.5} ${h*.58} ${w*.81} ${h*.4}`}/>
      <line x1={w*.5} y1={h*.14} x2={w*.5} y2={h*.58}/>
    </g>,
  };
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:"block",flexShrink:0}}>
      <defs>
        <linearGradient id={`bg${game.id}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={game.c1}/><stop offset="75%" stopColor={game.c2} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={game.c2} stopOpacity="0.07"/>
        </linearGradient>
        <radialGradient id={`gw${game.id}`} cx="50%" cy="38%" r="55%">
          <stop offset="0%" stopColor={game.c2} stopOpacity="0.28"/><stop offset="100%" stopColor="transparent"/>
        </radialGradient>
        <linearGradient id={`ft${game.id}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="rgba(0,0,0,0)"/><stop offset="100%" stopColor="rgba(0,0,0,0.75)"/>
        </linearGradient>
      </defs>
      <rect width={w} height={h} fill={`url(#bg${game.id})`} rx="6"/>
      <rect width={w} height={h} fill={`url(#gw${game.id})`} rx="6"/>
      {Shapes[game.shape] || Shapes.fighters}
      {[...Array(Math.floor(h/5))].map((_,i)=>(
        <rect key={i} x={0} y={i*5} width={w} height={1} fill="rgba(0,0,0,0.09)"/>
      ))}

    </svg>
  );
}

// Card with system badge overlay
function GameCard({ game, t, onClick }) {
  const [hov, setHov] = useState(false);
  const sys = SYSTEMS[game.system];
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        cursor:"pointer", borderRadius:10, overflow:"hidden",
        background:hov?t.cardHover:t.card,
        border:`1px solid ${hov?t.cardBorderHover:t.cardBorder}`,
        transition:"all 0.18s cubic-bezier(.2,.8,.2,1)",
        transform:hov?"translateY(-4px)":"none",
        boxShadow:hov?`0 10px 32px rgba(0,0,0,0.35),0 0 0 1px ${t.accent}33`:"none",
      }}>
      <div style={{position:"relative"}}>
        <BoxArt game={game} size={146}/>
        {/* System logo badge top-left of art */}
        <div style={{
          position:"absolute", top:6, left:6,
          background:"rgba(0,0,0,0.62)", backdropFilter:"blur(8px)",
          borderRadius:5, padding:"3px 5px",
          display:"flex", alignItems:"center", gap:4,
          border:"0.5px solid rgba(255,255,255,0.12)",
        }}>
          <SystemLogo systemId={game.system} height={sys.logoType==="png"?12:9}/>
          <span style={{color:"rgba(255,255,255,0.8)",fontSize:8,fontWeight:700,letterSpacing:"0.05em",lineHeight:1}}>
            {sys.short}
          </span>
        </div>
      </div>
      <div style={{padding:"7px 10px 9px"}}>
        <div style={{
          color:t.text, fontWeight:600, fontSize:12, lineHeight:1.25,
          marginBottom:4, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
        }}>{game.title}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{
            background:t.tag, color:t.tagText,
            fontSize:9, fontWeight:700, padding:"2px 6px", borderRadius:4,
            letterSpacing:"0.05em", textTransform:"uppercase",
          }}>{game.genre}</span>
          <span style={{color:t.textFaint,fontSize:10}}>{game.year}</span>
        </div>
      </div>
    </div>
  );
}

// ─── SIDEBAR ───────────────────────────────────────────────────────────────
function Sidebar({ t, activeId, onNav, navStyle }) {
  const counts = { neogeo:0, cps1:0, cps2:0 };
  GAMES.forEach(g => counts[g.system]++);

  const sysItems = [
    {id:"neogeo", ...SYSTEMS.neogeo, count:counts.neogeo},
    {id:"cps1",   ...SYSTEMS.cps1,   count:counts.cps1},
    {id:"cps2",   ...SYSTEMS.cps2,   count:counts.cps2},
  ];

  const navItems = [
    { id:"all",     label:"All Games",        icon:"▤" },
    { id:"favs",    label:"Favorites",         icon:"♡" },
    { id:"recent",  label:"Recently Played",   icon:"◷" },
  ];

  const renderItem = (id, label, icon, active) => (
    <div key={id} onClick={()=>onNav(id)}
      style={{
        padding:"5.5px 12px", margin:"1px 8px", borderRadius:7, cursor:"pointer",
        display:"flex", alignItems:"center", gap:8,
        background:active?t.sidebarActive:"transparent", transition:"background 0.14s",
      }}
      onMouseEnter={e=>{if(!active)e.currentTarget.style.background=t.accentSoft;}}
      onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
      <span style={{color:active?"white":t.icon,fontSize:11}}>{icon}</span>
      <span style={{color:active?"white":t.text,fontSize:12.5,fontWeight:active?600:400}}>{label}</span>
    </div>
  );

  const SectionHead = ({label}) => (
    <div style={{
      padding:"10px 16px 4px", color:t.textFaint,
      fontSize:10, fontWeight:700, letterSpacing:"0.09em",
    }}>{label}</div>
  );

  return (
    <div style={{
      width:200, flexShrink:0, height:"100%", display:"flex", flexDirection:"column",
      background:t.sidebar, backdropFilter:"blur(40px) saturate(180%)",
      WebkitBackdropFilter:"blur(40px) saturate(180%)",
      borderRight:`1px solid ${t.sidebarBorder}`,
    }}>
      {/* Traffic lights */}
      <div style={{padding:"13px 16px 10px", display:"flex", alignItems:"center", gap:8}}>
        <MacTrafficLights/>
      </div>
      {/* Brand */}
      <div style={{padding:"4px 14px 12px", borderBottom:`1px solid ${t.divider}`, marginBottom:4}}>
        <div style={{display:"flex", alignItems:"center", gap:9}}>
          <div style={{
            width:34, height:34, borderRadius:10, flexShrink:0,
            background:`linear-gradient(145deg,${t.accent} 0%,${t.accent}bb 100%)`,
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:`0 4px 14px ${t.accentGlow}`,
          }}>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="2" y="5" width="14" height="9" rx="2" stroke="white" strokeWidth="1.4"/>

// ─── IMPORT SCREEN ─────────────────────────────────────────────────────────
function ImportScreen({ t, onBack }) {
  const [drag, setDrag] = useState(false);
  const [files, setFiles] = useState([]);
  const [progress, setProgress] = useState({});
  const FAKE = ["mslug.zip","kof98.zip","sf2.zip","mvsc.zip","finalfight.zip"];

  const addFile = (name) => {
    const id = Date.now();
    setFiles(p=>[...p,{id,name,done:false}]);
    setProgress(p=>({...p,[id]:0}));
    const tick = setInterval(()=>{
      setProgress(p=>{
        const cur=p[id]||0;
        if(cur>=100){clearInterval(tick);setFiles(f=>f.map(x=>x.id===id?{...x,done:true}:x));return p;}
        return {...p,[id]:cur+Math.random()*22};
      });
    },80);
  };

  return (
    <div className="screen-enter" style={{padding:26,display:"flex",flexDirection:"column",gap:16}}>
      <button onClick={onBack} style={{
        background:"none",border:"none",cursor:"pointer",
        color:t.textMuted,fontSize:13,display:"flex",alignItems:"center",gap:5,
        padding:0,alignSelf:"flex-start",transition:"color 0.14s",
      }}
        onMouseEnter={e=>e.currentTarget.style.color=t.accent}
        onMouseLeave={e=>e.currentTarget.style.color=t.textMuted}
      >‹ Library</button>
      <div>
        <h2 style={{color:t.text,fontSize:22,fontWeight:800,letterSpacing:"-0.025em",marginBottom:3}}>Import ROMs</h2>
        <p style={{color:t.textMuted,fontSize:13}}>Add ROM files to your Sprite Engine library. Supports Neo Geo, CPS-1, and CPS-2 archives.</p>
      </div>

      {/* System badges */}
      <div style={{display:"flex",gap:8}}>
        {Object.values(SYSTEMS).map(sys=>(
          <div key={sys.id} style={{
            display:"flex",alignItems:"center",gap:7,
            background:t.card,border:`1px solid ${t.cardBorder}`,
            borderRadius:8,padding:"7px 12px",
          }}>
            <SystemLogo systemId={sys.id} height={sys.logoType==="png"?18:12}/>
            <span style={{color:t.text,fontWeight:600,fontSize:12}}>{sys.name}</span>
            <span style={{color:t.textFaint,fontSize:10}}>{GAMES.filter(g=>g.system===sys.id).length} ROMs</span>
          </div>
        ))}
      </div>

      {/* Drop zone */}
      <div onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);addFile(FAKE[Math.floor(Math.random()*FAKE.length)]);}}
        onClick={()=>addFile(FAKE[Math.floor(Math.random()*FAKE.length)])}
        style={{
          border:`2px dashed ${drag?t.accent:t.divider}`,
          borderRadius:12,padding:"36px 24px",textAlign:"center",cursor:"pointer",
          background:drag?t.accentSoft:t.card,transition:"all 0.16s",
        }}>
        <div style={{fontSize:34,marginBottom:8}}>📦</div>
        <div style={{color:t.text,fontWeight:600,fontSize:14,marginBottom:3}}>
          {drag?"Drop to add" : "Drop ROM files here"}
        </div>
        <div style={{color:t.textMuted,fontSize:12,marginBottom:14}}>.zip, .rom · Neo Geo, CPS-1, CPS-2</div>
        <div style={{
          display:"inline-block",background:t.playBtn,color:"white",
          fontWeight:600,fontSize:13,padding:"7px 18px",borderRadius:8,
          boxShadow:`0 3px 10px ${t.accentGlow}`,
        }}>Choose Files</div>
      </div>

      {/* BIOS notice */}
      <div style={{
        background:t.card,border:`1px solid ${t.cardBorder}`,
        borderRadius:9,padding:"11px 14px",
        display:"flex",gap:10,alignItems:"flex-start",
      }}>
        <div style={{color:t.accent,fontSize:14,flexShrink:0}}>ℹ</div>
        <div>
          <div style={{color:t.text,fontWeight:600,fontSize:12.5,marginBottom:2}}>BIOS Files Required</div>
          <div style={{color:t.textMuted,fontSize:11.5}}>
            Place <code style={{background:t.input,padding:"1px 5px",borderRadius:4,color:t.accent,fontFamily:"ui-monospace,monospace",fontSize:11}}>neogeo.zip</code> for Neo Geo,
            {" "}<code style={{background:t.input,padding:"1px 5px",borderRadius:4,color:t.accent,fontFamily:"ui-monospace,monospace",fontSize:11}}>qsound.zip</code> for CPS-2 in your ROM directory.
          </div>
        </div>
      </div>

      {files.length>0&&(
        <div>
          <div style={{color:t.textFaint,fontSize:10,fontWeight:700,letterSpacing:"0.08em",marginBottom:7}}>IMPORTING</div>
          {files.map(f=>{
            const pct=Math.min(progress[f.id]||0,100);
            return(
              <div key={f.id} style={{
                background:t.card,border:`1px solid ${f.done?t.accent+"44":t.cardBorder}`,
                borderRadius:8,padding:"9px 13px",marginBottom:5,
              }}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:f.done?0:5}}>
                  <span style={{color:f.done?"#30d158":t.textMuted,fontSize:13}}>{f.done?"✓":"⋯"}</span>
                  <span style={{color:t.text,fontSize:12.5,flex:1}}>{f.name}</span>
                  <span style={{color:f.done?"#30d158":t.textMuted,fontSize:11}}>{f.done?"Ready":`${Math.floor(pct)}%`}</span>
                </div>
                {!f.done&&(
                  <div style={{height:3,background:t.divider,borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:t.accent,borderRadius:2,transition:"width 0.1s"}}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [tweaks,setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOn,setTweaksOn] = useState(false);
  const [navId,setNavId] = useState("all");
  const [screen,setScreen] = useState("library");
  const [game,setGame] = useState(null);
  const [search,setSearch] = useState("");

  const t = THEMES[tweaks.theme] || THEMES.dark;
  const navStyle = tweaks.navStyle || "sidebar";

  useEffect(()=>{
    const h = e=>{
      if(e.data?.type==="__activate_edit_mode") setTweaksOn(true);
      if(e.data?.type==="__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message",h);
    window.parent.postMessage({type:"__edit_mode_available"},"*");
    return()=>window.removeEventListener("message",h);
  },[]);

  const handleNav = id=>{
    if(id==="import"){setScreen("import");setNavId(id);return;}
    if(id==="settings")return;
    setNavId(id);setScreen("library");setSearch("");
  };

  const title = screen==="detail"?game?.title
    : screen==="import"?"Import ROMs"
    : navId==="favs"?"Favorites"
    : navId==="recent"?"Recently Played"
    : SYSTEMS[navId]?`${SYSTEMS[navId].name} (${GAMES.filter(g=>g.system===navId).length})`
    : `All Games (${GAMES.length})`;

  return (
    <div style={{
      minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:t.bg,padding:20,
    }}>
      <div style={{
        position:"relative",width:1140,height:710,borderRadius:16,overflow:"hidden",
        background:t.win,
        boxShadow:`0 0 0 1px ${t.winBorder},0 36px 100px rgba(0,0,0,0.65),0 8px 28px rgba(0,0,0,0.4)`,
        display:"flex",
      }}>
        <Sidebar t={t} activeId={navId} onNav={handleNav} navStyle={navStyle}/>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <Toolbar t={t} title={title} search={search} setSearch={setSearch} onImport={()=>handleNav("import")}/>
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            {screen==="library"&&
              <LibraryScreen t={t} onSelect={g=>{setGame(g);setScreen("detail");}}
                filter={navId} search={search} navStyle={navStyle}
                onSystemSelect={id=>{setNavId(id);setSearch("");}}/>}
            {screen==="detail"&&game&&
              <div style={{flex:1,overflowY:"auto"}}>
                <DetailScreen t={t} game={game} onBack={()=>{setScreen("library");setGame(null);}}/>
              </div>}
            {screen==="import"&&<div style={{flex:1,overflowY:"auto"}}><ImportScreen t={t} onBack={()=>{setNavId("all");setScreen("library");}}/></div>}
          </div>
        </div>
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksOn}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
